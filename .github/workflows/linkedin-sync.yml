name: LinkedIn Experience Sync

on:
  schedule:
    # Runs every day at midnight UTC
    - cron: '0 0 * * *'
  workflow_dispatch: # Allows you to trigger it manually

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Sync LinkedIn Experience
        uses: joshuatz/linkedin-to-readme@v1
        with:
          linkedin-public-url: 'https://www.linkedin.com/in/jcalvink/'
          # This template matches the clean look of your current README
          experience-template: '### **{title}** at **{company}** \n*({duration})*\n\n{description}\n\n---'

      - name: Commit and Push
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add README.md
          git commit -m "docs: auto-update experience from LinkedIn" || exit 0
          git push
